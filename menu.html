<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="menuPageTitle"></title>
    <meta name="description" content="La Luna menu — Nordic cuisine, lunch, sandwiches, meat, fish, desserts, cocktails and more in Alicante, Spain.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="/js/translator.js" defer></script>
    <script src="/js/website.js" defer></script>
    <script type="module" src="/js/data.js" defer></script>
</head>
<body>
    <nav id="mainNav" class="menuAlt">
        <a href="/"><img src="/images/la luna w.png" alt="La Luna Logo"></a>
        <input type="checkbox" id="menuToggle" />
        <label for="menuToggle" class="hamburger hamburgerAlt">&#9776;</label>
        <div class="navLinks menuAlt" id="navLinks">
            <a class="home" data-i18n="nav.home" href="/"></a>
            <a data-i18n="nav.menu" href="/menu"></a>
            <a class="openGolf" data-i18n="nav.golf"></a>
            <a class="podcast" data-i18n="nav.podcast" href="/podcast"></a>
        </div>
    </nav>
    <main>
        <div id="menuHero">
            <h1 data-i18n="menuh1"></h1>
            <button id="openCategory" class="CategoryButton" data-i18n="category"></button>
            <div id="openingHours">
                <p data-i18n="footer.opening.1"></p>
                <p class="lineBreak" data-i18n="footer.opening.2"></p>
                <p class="lineBreak" data-i18n="footer.opening.3"></p>
            </div>
        </div>
        <a href="#menuHero"><div id="scrollTop"></div></a>
        <div id="langSelector">
            <img id="flagImg" src="/images/no.png" alt="language flag">
            <button id="languageSwitcher" onchange="changeFlag()" data-i18n="selector.title"></button>
            <div class="selectHide" id="langOptions">
                <div id="no" class="option" value="no" data-i18n="selector.no"></div>
                <div id="en" class="option" value="en" data-i18n="selector.en"></div>
                <div id="es" class="option" value="es" data-i18n="selector.es"></div>
            </div>
        </div>
        <div id="menu">
            <h3 style="text-align: center; padding: 2rem;">Loading Menu...</h3>
        </div>
    </main>
    <footer class="menuAlt">
        <div class="footer-grid">
            <div class="footer-brand">
                <a href="/"><img src="/images/la luna w.png" alt="La Luna Logo"></a>
                <p data-i18n="footer.tagline"></p>
                <div class="social-icons">
                    <a href="https://www.facebook.com/LaLunaLasMimosas" target="_blank" class="fa fa-facebook" aria-label="Facebook"></a>
                    <a href="https://www.instagram.com/la_luna_restaurante/" target="_blank" class="fa fa-instagram" aria-label="Instagram"></a>
                    <a href="https://wa.me/34650049726" target="_blank" class="fa fa-whatsapp" aria-label="WhatsApp"></a>
                </div>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer.quicklinks"></h4>
                <a data-i18n="nav.home" href="/"></a>
                <a data-i18n="nav.menu" href="/menu"></a>
                <a class="openGolf" data-i18n="nav.golf"></a>
                <a data-i18n="nav.podcast" href="/podcast"></a>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer.opening.title"></h4>
                <p class="lineBreak" data-i18n="footer.opening.1"></p>
                <p class="lineBreak" data-i18n="footer.opening.2"></p>
                <p class="lineBreak" data-i18n="footer.opening.3"></p>
            </div>
            <div class="footer-col">
                <h4 data-i18n="footer.contactTitle"></h4>
                <p class="lineBreak" data-i18n="footer.address"></p>
                <p>+34 650 049 726</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2025 La Luna Bar & Restaurant. All rights reserved.</p>
        </div>
    </footer>
    <dialog id="golfOverlay" class="overlay">
        <div id="golfImg">
            <img src="/images/lalunaGolfLogo.png" alt="La Luna logo">
            <div class="x">&times;</div>
        </div>
        <div class="contentBox">
            <h3 data-i18n="golfOverlay.h3"></h3>
            <p data-i18n="golfOverlay.p"></p>
        </div>
    </dialog>
    <dialog id="categoryOverlay" class="overlay">
        <div class="x">&times;</div>
        <div class="categoryItems">
            <a href="#lunch" class="close"><h3 class="categoryItem" data-i18n="categoryItem.1"></h3></a>
            <a href="#sandwich" class="close"><h3 class="categoryItem" data-i18n="categoryItem.2"></h3></a>
            <a href="#starter" class="close"><h3 class="categoryItem" data-i18n="categoryItem.3"></h3></a>
            <a href="#meat" class="close"><h3 class="categoryItem" data-i18n="categoryItem.4"></h3></a>
            <a href="#fish" class="close"><h3 class="categoryItem" data-i18n="categoryItem.5"></h3></a>
            <a href="#dessert" class="close"><h3 class="categoryItem" data-i18n="categoryItem.6"></h3></a>
            <a href="#coffee" class="close"><h3 class="categoryItem" data-i18n="categoryItem.7"></h3></a>
            <a href="#drinks" class="close"><h3 class="categoryItem" data-i18n="categoryItem.8"></h3></a>
            <a href="#gin" class="close"><h3 class="categoryItem" data-i18n="categoryItem.9"></h3></a>
            <a href="#tonic" class="close"><h3 class="categoryItem" data-i18n="categoryItem.10"></h3></a>
            <br>
        </div>
    </dialog>
</body>
</html>
